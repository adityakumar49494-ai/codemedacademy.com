<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>

<section class="section">
  <div class="container">
    <h2>Module Quiz</h2>

    <div class="quiz-box">
      <p>ICD-10 codes are used for?</p>
      <input type="radio" name="q1" value="wrong"> Equipment<br>
      <input type="radio" name="q1" value="correct"> Diagnosis<br>
      <input type="radio" name="q1" value="wrong"> Hospital ID<br>
    </div>

    <button class="btn" onclick="checkQuiz()">Submit</button>
    <p id="result"></p>
  </div>
</section>

</body>
</html>
